<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Nowe zgłoszenie - HelpDesk Pro</title>
    <link href="../assets/favicon.svg" rel="icon" type="image/svg+xml" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link href="../sass/main.css" rel="stylesheet" />
  </head>
  <body data-page="new-ticket" data-required-role="user">
    <div class="app">
      <aside class="app__sidebar" id="sidebar">
        <div class="app__sidebar__brand">
          <div class="app__sidebar__brand__iconBox">
            <svg aria-hidden="true" class="icon">
              <use href="../assets/icons.svg#support"></use>
            </svg>
          </div>
          <div class="app__sidebar__brand__textBox">
            <h1 class="app__sidebar__brand__textBox__title">HelpDesk Pro</h1>
            <p class="app__sidebar__brand__textBox__subtitle">
              IT Support System
            </p>
          </div>
        </div>
        <nav class="app__sidebar__navigation">
          <a class="app__sidebar__navigation__link" href="my-tickets.html"
            ><svg aria-hidden="true" class="icon">
              <use href="../assets/icons.svg#ticket"></use></svg
            ><span>Moje zgłoszenia</span></a
          ><a
            class="app__sidebar__navigation__link app__sidebar__navigation__link--active"
            href="new-ticket.html"
            ><svg aria-hidden="true" class="icon">
              <use href="../assets/icons.svg#plus"></use></svg
            ><span>Nowe zgłoszenie</span></a
          >
        </nav>
        <div class="app__sidebar__footer">
          <a class="app__sidebar__navigation__link" href="../index.html"
            ><svg aria-hidden="true" class="icon">
              <use href="../assets/icons.svg#logout"></use></svg
            ><span>Wyloguj</span></a
          >
        </div>
      </aside>
      <div class="app__overlay" id="sidebarOverlay"></div>
      <div class="app__content">
        <header class="app__topbar">
          <div class="app__topbar__left">
            <button
              aria-label="Otwórz menu"
              class="app__topbar__left__menuButton"
              id="menuButton"
            >
              <svg aria-hidden="true" class="icon">
                <use href="../assets/icons.svg#menu"></use>
              </svg>
            </button>
            <h2 class="app__topbar__left__title">Nowe zgłoszenie</h2>
          </div>
          <div class="app__topbar__right">
            <div class="app__topbar__right__separator"></div>
            <div class="app__topbar__right__profile">
              <div class="app__topbar__right__profile__textBox">
                <p class="app__topbar__right__profile__textBox__name">
                  Jan Kowalski
                </p>
                <p class="app__topbar__right__profile__textBox__role">
                  Użytkownik
                </p>
              </div>
              <div class="app__topbar__right__profile__avatar">JK</div>
            </div>
          </div>
        </header>
        <main class="app__main">
          <section class="app__main__welcome">
            <div class="app__main__welcome__textBox">
              <h1 class="app__main__welcome__textBox__title">Zgłoś problem</h1>
              <p class="app__main__welcome__textBox__text">
                Wypełnij formularz, aby utworzyć nowe zgłoszenie.
              </p>
            </div>
          </section>
          <section class="formCard">
            <form class="form" id="newTicketForm">
              <div class="form__group">
                <label class="form__group__label" for="ticketTitle"
                  >Tytuł zgłoszenia *</label
                ><input
                  class="form__group__input"
                  id="ticketTitle"
                  placeholder="Krótki i zwięzły opis problemu..."
                  required=""
                  type="text"
                />
              </div>
              <div class="form__row">
                <div class="form__group">
                  <label class="form__group__label" for="category"
                    >Kategoria *</label
                  ><select
                    class="form__group__select"
                    id="category"
                    required=""
                  >
                    <option value="">Wybierz kategorię</option>
                    <option>Sprzęt</option>
                    <option>Oprogramowanie</option>
                    <option>Sieć</option>
                    <option>Konto użytkownika</option>
                    <option>Inne</option>
                  </select>
                </div>
                <div class="form__group">
                  <label class="form__group__label" for="priority"
                    >Priorytet *</label
                  ><select
                    class="form__group__select"
                    id="priority"
                    required=""
                  >
                    <option>Niski</option>
                    <option selected="">Średni</option>
                    <option>Wysoki</option>
                  </select>
                </div>
              </div>
              <div class="form__group">
                <label class="form__group__label" for="description"
                  >Opis szczegółowy *</label
                ><textarea
                  class="form__group__textarea"
                  id="description"
                  placeholder="Opisz dokładnie swój problem..."
                  required=""
                ></textarea>
              </div>
              <div class="form__actions">
                <a class="secondaryButton" href="my-tickets.html">Anuluj</a
                ><button class="primaryButton" type="submit">
                  <svg aria-hidden="true" class="icon">
                    <use href="../assets/icons.svg#send"></use></svg
                  >Wyślij zgłoszenie
                </button>
              </div>
            </form>
          </section>
        </main>
      </div>
    </div>
    <script src="../js/main.js" type="module"></script>
  </body>
</html>
